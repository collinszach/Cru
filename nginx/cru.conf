# ============================================================
# Cru — Nginx Production Configuration
# Proxies HTTPS traffic to the frontend and backend containers.
# Assumes certificates are at /etc/nginx/certs/cru.{crt,key}.
# ============================================================

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cru.local;  # Replace with your actual domain

    # TLS
    ssl_certificate     /etc/nginx/certs/cru.crt;
    ssl_certificate_key /etc/nginx/certs/cru.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # --------------------------------------------------------
    # Backend API — all /api/* and /docs /openapi.json routes
    # --------------------------------------------------------
    location /api/ {
        proxy_pass         http://cru-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow larger uploads for label photo scanning
        client_max_body_size 20m;

        # Longer timeout for Claude Vision calls (target < 8s, headroom to 30s)
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    # FastAPI interactive docs (development convenience — restrict in prod if desired)
    location ~ ^/(docs|redoc|openapi\.json)$ {
        proxy_pass         http://cru-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # MinIO presigned URL pass-through (label photo serving)
    # Requests signed by the backend — no auth header needed here
    # --------------------------------------------------------
    location /storage/ {
        proxy_pass         http://cru-minio:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              cru-minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Cache public presigned assets aggressively
        proxy_cache_valid  200 1h;
        add_header         Cache-Control "public, max-age=3600, immutable";
    }

    # --------------------------------------------------------
    # Frontend — everything else goes to Next.js
    # --------------------------------------------------------
    location / {
        proxy_pass         http://cru-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for Next.js HMR websocket in dev (not active in prod but harmless)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Next.js static assets — serve with long cache
    location /_next/static/ {
        proxy_pass         http://cru-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }
}
