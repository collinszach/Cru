name: Backend tests

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cru_user
          POSTGRES_PASSWORD: cru_test_password
          POSTGRES_DB: cru_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cru_user -d cru_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://cru_user:cru_test_password@localhost:5432/cru_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short
